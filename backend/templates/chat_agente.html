<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BarboBank - Agente IA</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
  :root {
    --bg:          #0d1b3e;
    --surface:     rgba(255,255,255,0.07);
    --surface-2:   rgba(255,255,255,0.11);
    --border:      rgba(255,255,255,0.11);
    --accent:      #378ADD;
    --accent-deep: #185FA5;
    --accent-glow: rgba(55,138,221,0.35);
    --text-1:      #f0f4ff;
    --text-2:      rgba(240,244,255,0.55);
    --text-3:      rgba(240,244,255,0.3);
    --user-bg:     linear-gradient(135deg, #378ADD, #185FA5);
    --bot-bg:      rgba(255,255,255,0.08);
    --bot-border:  rgba(255,255,255,0.10);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Sora', sans-serif;
    background: var(--bg);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 1.5rem 1rem;
    position: relative;
    overflow: hidden;
    color: var(--text-1);
  }

  /* ── Orbes de fondo ── */
  body::before {
    content: '';
    position: fixed;
    width: 600px; height: 600px;
    background: radial-gradient(circle, rgba(55,138,221,0.28) 0%, transparent 70%);
    top: -180px; right: -120px;
    border-radius: 50%;
    animation: orb-a 12s ease-in-out infinite alternate;
    pointer-events: none;
  }
  body::after {
    content: '';
    position: fixed;
    width: 450px; height: 450px;
    background: radial-gradient(circle, rgba(24,95,165,0.22) 0%, transparent 70%);
    bottom: -120px; left: -80px;
    border-radius: 50%;
    animation: orb-b 16s ease-in-out infinite alternate;
    pointer-events: none;
  }
  @keyframes orb-a {
    from { transform: translate(0,0) scale(1); }
    to   { transform: translate(-25px, 35px) scale(1.1); }
  }
  @keyframes orb-b {
    from { transform: translate(0,0) scale(1); }
    to   { transform: translate(30px,-25px) scale(1.08); }
  }

  /* ── Contenedor chat ── */
  .chat-wrap {
    position: relative;
    z-index: 2;
    width: 100%;
    max-width: 580px;
    height: 88vh;
    max-height: 760px;
    display: flex;
    flex-direction: column;
    background: rgba(255,255,255,0.06);
    backdrop-filter: blur(28px) saturate(150%);
    -webkit-backdrop-filter: blur(28px) saturate(150%);
    border-radius: 22px;
    border: 1px solid var(--border);
    box-shadow:
      0 2px 0 rgba(255,255,255,0.06) inset,
      0 32px 80px rgba(0,0,0,0.55);
    animation: rise 0.65s cubic-bezier(.22,1,.36,1) both;
    overflow: hidden;
  }
  @keyframes rise {
    from { opacity:0; transform: translateY(24px); }
    to   { opacity:1; transform: translateY(0); }
  }

  /* ── Header ── */
  .header {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 1rem 1.25rem;
    border-bottom: 1px solid var(--border);
    background: rgba(255,255,255,0.04);
    flex-shrink: 0;
  }
  .avatar {
    width: 38px; height: 38px;
    border-radius: 12px;
    background: linear-gradient(135deg, #378ADD, #185FA5);
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
    box-shadow: 0 4px 16px rgba(55,138,221,0.45);
    flex-shrink: 0;
  }
  .header-info { flex: 1; }
  .header-name {
    font-size: 14px;
    font-weight: 600;
    color: var(--text-1);
  }
  .header-sub {
    font-size: 11px;
    color: var(--text-2);
    display: flex;
    align-items: center;
    gap: 5px;
    margin-top: 1px;
  }
  .dot-online {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: #4ecb8d;
    box-shadow: 0 0 6px rgba(78,203,141,0.7);
    animation: pulse-dot 2s ease-in-out infinite;
  }
  @keyframes pulse-dot {
    0%,100% { opacity: 1; }
    50%      { opacity: 0.4; }
  }
  .logo-chip {
    font-size: 13px;
    font-weight: 600;
    color: var(--text-2);
    letter-spacing: -0.3px;
  }
  .logo-chip span { color: #78b9f5; }

  /* ── Mensajes ── */
  .messages {
    flex: 1;
    padding: 1.25rem 1rem;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 10px;
    scroll-behavior: smooth;
  }
  .messages::-webkit-scrollbar { width: 4px; }
  .messages::-webkit-scrollbar-track { background: transparent; }
  .messages::-webkit-scrollbar-thumb {
    background: rgba(255,255,255,0.12);
    border-radius: 99px;
  }

  .msg-row {
    display: flex;
    align-items: flex-end;
    gap: 8px;
    animation: msg-in 0.3s cubic-bezier(.22,1,.36,1) both;
  }
  @keyframes msg-in {
    from { opacity:0; transform: translateY(8px); }
    to   { opacity:1; transform: translateY(0); }
  }
  .msg-row.user { flex-direction: row-reverse; }

  .msg-avatar {
    width: 28px; height: 28px;
    border-radius: 9px;
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px;
  }
  .msg-avatar.bot-av {
    background: linear-gradient(135deg, #378ADD, #185FA5);
    box-shadow: 0 2px 10px rgba(55,138,221,0.4);
  }
  .msg-avatar.user-av {
    background: rgba(255,255,255,0.1);
    border: 1px solid var(--border);
  }

  .bubble {
    max-width: 72%;
    padding: 10px 14px;
    border-radius: 14px;
    font-size: 13.5px;
    line-height: 1.55;
    word-break: break-word;
  }
  .bubble.bot {
    background: var(--bot-bg);
    border: 1px solid var(--bot-border);
    color: var(--text-1);
    border-bottom-left-radius: 4px;
  }
  .bubble.user {
    background: var(--user-bg);
    color: #fff;
    border-bottom-right-radius: 4px;
    box-shadow: 0 4px 16px rgba(55,138,221,0.35);
  }

  /* ── Typing indicator ── */
  .typing-row { display: none; }
  .typing {
    display: flex; gap: 5px; padding: 12px 16px;
    background: var(--bot-bg);
    border: 1px solid var(--bot-border);
    border-radius: 14px;
    border-bottom-left-radius: 4px;
    width: fit-content;
  }
  .typing span {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--accent);
    animation: bounce 1.2s ease-in-out infinite;
    opacity: 0.6;
  }
  .typing span:nth-child(2) { animation-delay: 0.18s; }
  .typing span:nth-child(3) { animation-delay: 0.36s; }
  @keyframes bounce {
    0%,60%,100% { transform: translateY(0); opacity:0.4; }
    30%          { transform: translateY(-6px); opacity:1; }
  }

  /* ── Input ── */
  .input-area {
    padding: 0.9rem 1rem;
    border-top: 1px solid var(--border);
    background: rgba(255,255,255,0.03);
    display: flex;
    gap: 8px;
    align-items: center;
    flex-shrink: 0;
  }

  #input {
    flex: 1;
    background: rgba(255,255,255,0.07);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 10px 14px;
    font-size: 13.5px;
    color: var(--text-1);
    font-family: 'Sora', sans-serif;
    outline: none;
    transition: border-color 0.18s, background 0.18s, box-shadow 0.18s;
    resize: none;
    height: 44px;
  }
  #input::placeholder { color: var(--text-3); }
  #input:focus {
    border-color: rgba(55,138,221,0.6);
    background: rgba(55,138,221,0.07);
    box-shadow: 0 0 0 3px rgba(55,138,221,0.15);
  }

  .send-btn {
    width: 44px; height: 44px;
    border-radius: 12px;
    border: none;
    background: linear-gradient(135deg, #378ADD, #185FA5);
    color: white;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: transform 0.14s, box-shadow 0.18s, opacity 0.18s;
    box-shadow: 0 4px 16px rgba(55,138,221,0.4);
    flex-shrink: 0;
  }
  .send-btn:hover  { transform: translateY(-2px); box-shadow: 0 6px 22px rgba(55,138,221,0.55); }
  .send-btn:active { transform: translateY(0); }
  .send-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
  .send-btn svg { width: 18px; height: 18px; }
</style>
</head>

<body>

<div class="chat-wrap">

  <!-- Header -->
  <div class="header">
    <div class="avatar">🤖</div>
    <div class="header-info">
      <div class="header-name">Agente de Crédito IA</div>
      <div class="header-sub">
        <span class="dot-online"></span>
        En línea
      </div>
    </div>
    <div class="logo-chip">Barbo<span>Bank</span></div>
  </div>

  <!-- Mensajes -->
  <div id="messages" class="messages">
    <!-- Los mensajes aparecen aquí -->
    <div class="msg-row typing-row" id="typing-row">
      <div class="msg-avatar bot-av">🤖</div>
      <div class="typing">
        <span></span><span></span><span></span>
      </div>
    </div>
  </div>

  <!-- Input -->
  <div class="input-area">
    <input id="input" placeholder="Escribe tu mensaje..." autocomplete="off" />
    <button class="send-btn" id="send-btn" onclick="enviar()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="22" y1="2" x2="11" y2="13"></line>
        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
      </svg>
    </button>
  </div>

</div>

<script>
  function generateUUID() {
    return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, function(c) {
        const r = Math.random() * 16 | 0;
        const v = c == 'x' ? r : (r & 0x3 | 0x8);
        return v.toString(16);
    });
}
const session_id = generateUUID();
  const messagesEl = document.getElementById('messages');
  const typingRow  = document.getElementById('typing-row');
  const sendBtn    = document.getElementById('send-btn');
  const inputEl    = document.getElementById('input');

  function addMsg(text, type) {
    const isBot = type === 'bot';

    const row = document.createElement('div');
    row.className = 'msg-row ' + type;

    const av = document.createElement('div');
    av.className = 'msg-avatar ' + (isBot ? 'bot-av' : 'user-av');
    av.textContent = isBot ? '🤖' : '👤';

    const bubble = document.createElement('div');
    bubble.className = 'bubble ' + type;
    bubble.textContent = text;

    row.appendChild(av);
    row.appendChild(bubble);

    // insertar antes del typing indicator
    messagesEl.insertBefore(row, typingRow);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function setTyping(visible) {
    typingRow.style.display = visible ? 'flex' : 'none';
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  async function enviar() {
    const texto = inputEl.value.trim();
    if (!texto) return;

    addMsg(texto, 'user');
    inputEl.value = '';
    sendBtn.disabled = true;
    setTyping(true);

    try {
      const res = await fetch('/agente/chat_agente', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ mensaje: texto, session_id })
      });

      const data = await res.json();
      setTyping(false);
      addMsg(data.respuesta, 'bot');

    } catch (e) {
      setTyping(false);
      addMsg('Error conectando con el servidor.', 'bot');
    } finally {
      sendBtn.disabled = false;
      inputEl.focus();
    }
  }

  inputEl.addEventListener('keypress', e => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      enviar();
    }
  });

  // Saludo inicial con datos del cliente si existen
  window.addEventListener('load', async () => {
    const raw = localStorage.getItem('cliente');
    const cliente = raw ? JSON.parse(raw) : null;

    if (cliente && cliente.nombre) {
      setTyping(true);
      try {
        const res = await fetch('/agente/chat_agente', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            mensaje: `Contexto del cliente: ${JSON.stringify(cliente)}. Saluda al cliente por su nombre y explícale brevemente su resultado crediticio de forma amable.`,
            session_id
          })
        });
        const data = await res.json();
        setTyping(false);
        addMsg(data.respuesta, 'bot');
      } catch {
        setTyping(false);
        addMsg('Hola, soy tu asistente de crédito BarboBank. ¿En qué te puedo ayudar?', 'bot');
      }
    } else {
      addMsg('Hola, soy tu asistente de crédito BarboBank. ¿En qué te puedo ayudar?', 'bot');
    }
  });
</script>

</body>
</html>
